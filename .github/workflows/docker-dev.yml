name: Publish Dev Docker Images

on:
  push:
    branches:
      - dev

jobs:
  docker-publish-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_DOCKERHUB: darknetz/php-rand
      IMAGE_GHCR: ghcr.io/darknetzz/php-rand
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev images (Docker Hub + GHCR)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            PHP_RAND_VERSION=dev
          tags: |
            ${{ env.IMAGE_DOCKERHUB }}:dev
            ${{ env.IMAGE_DOCKERHUB }}:develop
            ${{ env.IMAGE_GHCR }}:dev
            ${{ env.IMAGE_GHCR }}:develop

      - name: Build and push dev images (GHCR only fallback)
        if: ${{ !(secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            PHP_RAND_VERSION=dev
          tags: |
            ${{ env.IMAGE_GHCR }}:dev
            ${{ env.IMAGE_GHCR }}:develop
