name: Publish Docker Images

on:
  push:
    tags:
      - "v*"

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_DOCKERHUB: darknetz/php-rand
      IMAGE_GHCR: ghcr.io/darknetzz/php-rand
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract release tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          RAW_TAG="${GITHUB_REF_NAME}"
          STRIPPED_TAG="${RAW_TAG#v}"
          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "stripped_tag=$STRIPPED_TAG" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images (Docker Hub + GHCR)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            PHP_RAND_VERSION=${{ steps.vars.outputs.raw_tag }}
          tags: |
            ${{ env.IMAGE_DOCKERHUB }}:latest
            ${{ env.IMAGE_DOCKERHUB }}:${{ steps.vars.outputs.raw_tag }}
            ${{ env.IMAGE_DOCKERHUB }}:${{ steps.vars.outputs.stripped_tag }}
            ${{ env.IMAGE_GHCR }}:latest
            ${{ env.IMAGE_GHCR }}:${{ steps.vars.outputs.raw_tag }}
            ${{ env.IMAGE_GHCR }}:${{ steps.vars.outputs.stripped_tag }}

      - name: Build and push images (GHCR only fallback)
        if: ${{ !(secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            PHP_RAND_VERSION=${{ steps.vars.outputs.raw_tag }}
          tags: |
            ${{ env.IMAGE_GHCR }}:latest
            ${{ env.IMAGE_GHCR }}:${{ steps.vars.outputs.raw_tag }}
            ${{ env.IMAGE_GHCR }}:${{ steps.vars.outputs.stripped_tag }}
